version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support-ticket-backend
    ports:
      - '5000:5000'
    environment:
      BACKEND_PORT: 5000
      DATABASE_URL: file:./prisma/dev.db
    volumes:
      - ./backend/prisma:/app/prisma
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: support-ticket-frontend
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
